extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
      - polish

  scope-enum:
    - 1
    - always
    - - core
      - detection
      - intervention
      - audit
      - authorization
      - sdk
      - aspnetcore
      - mcp
      - claude-code
      - copilot
      - cli
      - sqlite
      - azure-sentinel
      - opentelemetry
      - benchmarks
      - ci
      - deps
      - backlog
      - design
      - plan
