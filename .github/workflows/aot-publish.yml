name: AOT publish

# Validates that `dotnet publish -p:PublishAot=true` produces a native single-file
# binary for both hook CLIs on a platform where the Visual C++ toolchain + Windows
# SDK are available (windows-latest ships both preinstalled). Runs on every push
# and PR that touches a CLI, the core library, or this workflow itself.
#
# Intentionally narrow: does not run the test suite or pack NuGet packages. Those
# live in their own workflow when the rest of CI is wired up.

on:
  push:
    branches: [main, master]
    paths:
      - "src/AI.Sentinel/**"
      - "src/AI.Sentinel.ClaudeCode/**"
      - "src/AI.Sentinel.ClaudeCode.Cli/**"
      - "src/AI.Sentinel.Copilot/**"
      - "src/AI.Sentinel.Copilot.Cli/**"
      - "src/AI.Sentinel.Mcp/**"
      - "src/AI.Sentinel.Mcp.Cli/**"
      - "Directory.Build.props"
      - "global.json"
      - ".github/workflows/aot-publish.yml"
  pull_request:
    paths:
      - "src/AI.Sentinel/**"
      - "src/AI.Sentinel.ClaudeCode/**"
      - "src/AI.Sentinel.ClaudeCode.Cli/**"
      - "src/AI.Sentinel.Copilot/**"
      - "src/AI.Sentinel.Copilot.Cli/**"
      - "src/AI.Sentinel.Mcp/**"
      - "src/AI.Sentinel.Mcp.Cli/**"
      - "Directory.Build.props"
      - "global.json"
      - ".github/workflows/aot-publish.yml"

jobs:
  publish-aot:
    runs-on: windows-latest
    strategy:
      matrix:
        project:
          - src/AI.Sentinel.ClaudeCode.Cli/AI.Sentinel.ClaudeCode.Cli.csproj
          - src/AI.Sentinel.Copilot.Cli/AI.Sentinel.Copilot.Cli.csproj
          - src/AI.Sentinel.Mcp.Cli/AI.Sentinel.Mcp.Cli.csproj
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish AOT (win-x64)
        shell: pwsh
        run: |
          dotnet publish ${{ matrix.project }} `
            -c Release `
            -r win-x64 `
            -p:PublishAot=true `
            -o aot-out
          if ($LASTEXITCODE -ne 0) { throw "Publish failed" }

      - name: Verify native binary produced
        shell: pwsh
        run: |
          $exe = Get-ChildItem aot-out -Filter "*.exe" |
                 Where-Object { $_.Name -notlike "createdump*" } |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Error "No native .exe produced in aot-out/"
            Get-ChildItem aot-out
            exit 1
          }
          $sizeMb = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "Native binary: $($exe.Name) ($sizeMb MB)"
          if ($sizeMb -gt 20) {
            Write-Warning "Binary is unexpectedly large ($sizeMb MB > 20 MB threshold)"
          }

      - name: Smoke test
        shell: pwsh
        run: |
          $exe = Get-ChildItem aot-out -Filter "*.exe" |
                 Where-Object { $_.Name -notlike "createdump*" } |
                 Select-Object -First 1
          if ($exe.Name -like "*Mcp*") {
            # MCP CLI: invoke with no args, expect exit 1 + Usage on stderr.
            $out = & $exe.FullName 2>&1
            $code = $LASTEXITCODE
            Write-Host "Exit: $code; output: $out"
            if ($code -ne 1) { Write-Error "MCP binary did not exit 1 with no args"; exit 1 }
            if ($out -notmatch "Usage") { Write-Error "Expected 'Usage' in stderr"; exit 1 }
            # The MCP binary's "success" exit code is 1 (intentional — no args = Usage).
            # Without resetting, PowerShell would propagate $LASTEXITCODE=1 to this step's
            # overall exit code, failing the job even though the assertions passed.
            $global:LASTEXITCODE = 0
          } else {
            # Hook CLIs: pipe JSON, try user-prompt-submit then user-prompt-submitted
            $payload = '{"session_id":"ci","sessionId":"ci","prompt":"hello"}'
            $out = $payload | & $exe.FullName user-prompt-submit 2>&1
            $code = $LASTEXITCODE
            if ($code -eq 1) {
              $out = $payload | & $exe.FullName user-prompt-submitted 2>&1
              $code = $LASTEXITCODE
            }
            Write-Host "Exit: $code; stdout: $out"
            if ($code -ne 0) { Write-Error "Native binary smoke test failed (exit $code)"; exit 1 }
          }

      - name: AOT nested-JSON CallToolAsync round-trip (MCP only)
        if: contains(matrix.project, 'AI.Sentinel.Mcp.Cli')
        shell: pwsh
        run: |
          # End-to-end smoke: drive the AOT-published proxy with a real MCP host transcript
          # against a Python stub MCP target. Exercises the AOT-sensitive path -—
          # ToObjectDictionary / nested-JSON CallToolAsync forwarding -— that the basic
          # `--help` smoke test does not cover. If reflection-based JSON serialisation in
          # the SDK regresses on AOT, this step fails because the nested-arg payload won't
          # round-trip back through the proxy.
          $exe = (Get-ChildItem aot-out -Filter "*.exe" |
                  Where-Object { $_.Name -notlike "createdump*" } |
                  Select-Object -First 1).FullName

          # Python stub MCP server: newline-delimited JSON-RPC over stdio, MCP 2024-11-05.
          # Responds to initialize / tools/list / tools/call (echoes nested args back as text).
          $stub = Join-Path $env:RUNNER_TEMP 'stub_mcp.py'
          @'
          import json, sys
          for line in sys.stdin:
              line = line.strip()
              if not line:
                  continue
              try:
                  msg = json.loads(line)
              except Exception:
                  continue
              method = msg.get('method', '')
              mid = msg.get('id')
              if method == 'initialize':
                  resp = {"jsonrpc":"2.0","id":mid,"result":{"protocolVersion":"2024-11-05","capabilities":{"tools":{}},"serverInfo":{"name":"stub","version":"0.1"}}}
                  sys.stdout.write(json.dumps(resp) + "\n"); sys.stdout.flush()
              elif method == 'notifications/initialized':
                  pass
              elif method == 'tools/list':
                  resp = {"jsonrpc":"2.0","id":mid,"result":{"tools":[{"name":"echo","description":"echo args","inputSchema":{"type":"object","properties":{"path":{"type":"object"},"flat":{"type":"string"}}}}]}}
                  sys.stdout.write(json.dumps(resp) + "\n"); sys.stdout.flush()
              elif method == 'tools/call':
                  args = msg.get('params', {}).get('arguments', {})
                  text = json.dumps(args)
                  resp = {"jsonrpc":"2.0","id":mid,"result":{"content":[{"type":"text","text":text}],"isError":False}}
                  sys.stdout.write(json.dumps(resp) + "\n"); sys.stdout.flush()
              else:
                  if mid is not None:
                      resp = {"jsonrpc":"2.0","id":mid,"error":{"code":-32601,"message":"not implemented"}}
                      sys.stdout.write(json.dumps(resp) + "\n"); sys.stdout.flush()
          '@ | Set-Content -Path $stub -Encoding UTF8

          # Host transcript: initialize -> initialized -> tools/call with nested-JSON args.
          $hostInput = Join-Path $env:RUNNER_TEMP 'host_in.jsonl'
          @(
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0.1"}}}'
            '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}'
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"path":{"nested":"value","deep":{"k":1}},"flat":"x"}}}'
          ) | Set-Content -Path $hostInput -Encoding ASCII

          $hostOutput = Join-Path $env:RUNNER_TEMP 'host_out.jsonl'
          $hostErr    = Join-Path $env:RUNNER_TEMP 'host_err.log'

          # Disable any inherited severity env that would block the round-trip.
          $env:SENTINEL_HOOK_ON_CRITICAL = 'Allow'
          $env:SENTINEL_HOOK_ON_HIGH     = 'Allow'
          $env:SENTINEL_HOOK_ON_MEDIUM   = 'Allow'
          $env:SENTINEL_HOOK_ON_LOW      = 'Allow'

          # Spawn the proxy with the python stub as target. Pipe the host transcript via stdin.
          # Shut down after a short wait: the host transcript ends without an explicit shutdown,
          # so we kill the proxy after responses settle.
          $py = (Get-Command python -ErrorAction SilentlyContinue) ?? (Get-Command python3 -ErrorAction SilentlyContinue)
          if (-not $py) { Write-Error 'Python not available on runner'; exit 1 }
          Write-Host "Using python: $($py.Source)"

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $exe
          foreach ($a in @('proxy','--target',$py.Source,$stub)) { [void]$psi.ArgumentList.Add($a) }
          $psi.RedirectStandardInput  = $true
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError  = $true
          $psi.UseShellExecute        = $false

          $proc = [System.Diagnostics.Process]::Start($psi)

          # Capture stdout/stderr line-by-line into thread-safe buffers so we can poll for
          # the expected response before tearing down. The previous "Start-Sleep 4 then close
          # stdin" pattern raced Python cold-start: occasionally the proxy hit stdin EOF and
          # exited before the python target's tools/call response arrived back, leaving the
          # round-trip assertion looking at empty stdout.
          $stdoutLines = [System.Collections.Concurrent.ConcurrentQueue[string]]::new()
          $stderrLines = [System.Collections.Concurrent.ConcurrentQueue[string]]::new()
          Register-ObjectEvent -InputObject $proc -EventName OutputDataReceived -Action {
            if ($null -ne $EventArgs.Data) { $event.MessageData.Enqueue($EventArgs.Data) }
          } -MessageData $stdoutLines | Out-Null
          Register-ObjectEvent -InputObject $proc -EventName ErrorDataReceived -Action {
            if ($null -ne $EventArgs.Data) { $event.MessageData.Enqueue($EventArgs.Data) }
          } -MessageData $stderrLines | Out-Null
          $proc.BeginOutputReadLine()
          $proc.BeginErrorReadLine()

          $payload = Get-Content $hostInput -Raw
          $proc.StandardInput.Write($payload)
          $proc.StandardInput.Flush()

          # Poll up to 30s for the tools/call response (id=2). Cold-start on Windows + AOT
          # init + python startup can comfortably eat 5-10s on shared CI runners.
          $deadline = [DateTime]::UtcNow.AddSeconds(30)
          $sawResponse = $false
          while ([DateTime]::UtcNow -lt $deadline) {
            $allLines = $stdoutLines.ToArray() -join "`n"
            if ($allLines -match '"id"\s*:\s*2') { $sawResponse = $true; break }
            Start-Sleep -Milliseconds 250
          }

          $proc.StandardInput.Close()
          if (-not $proc.WaitForExit(8000)) {
            Write-Host 'Proxy did not exit within 8s; killing.'
            $proc.Kill($true)
          }
          $proc.WaitForExit()

          $stdout = ($stdoutLines.ToArray() -join "`n")
          $stderr = ($stderrLines.ToArray() -join "`n")
          if (-not $sawResponse) {
            Write-Host "(timed out waiting for id=2 response after 30s)"
          }
          Set-Content -Path $hostOutput -Value $stdout -Encoding ASCII
          Set-Content -Path $hostErr    -Value $stderr -Encoding ASCII

          Write-Host '--- proxy stdout ---'
          Write-Host $stdout
          Write-Host '--- proxy stderr ---'
          Write-Host $stderr

          # Assert: the tools/call response (id=2) round-tripped the nested-JSON arg back.
          # The python stub echoes the arguments as a JSON string inside the `text` field.
          # That inner string then passes through the proxy's JsonSerializer which uses the
          # default JavaScriptEncoder — so embedded `"` become `"`. Match either form.
          if ($stdout -notmatch '(?:"|\\u0022)nested(?:"|\\u0022)\s*:\s*(?:"|\\u0022)value') {
            Write-Error 'AOT nested-JSON CallToolAsync round-trip failed: nested arg not echoed in stdout'
            exit 1
          }
          if ($stdout -notmatch '"id"\s*:\s*2') {
            Write-Error 'AOT nested-JSON CallToolAsync round-trip failed: tools/call response (id=2) missing'
            exit 1
          }
          Write-Host 'AOT nested-JSON CallToolAsync round-trip passed.'
