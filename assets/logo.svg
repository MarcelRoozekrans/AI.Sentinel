<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee" stop-opacity="0.15"/>
      <stop offset="50%" style="stop-color:#22d3ee" stop-opacity="1"/>
      <stop offset="100%" style="stop-color:#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Shield silhouette -->
  <path d="M 256 96 L 384 144 L 384 256 Q 384 360 256 416 Q 128 360 128 256 L 128 144 Z"
        fill="url(#shield)"
        opacity="0.95"/>

  <!-- Three detection scan lines (prompt / response / audit) -->
  <rect x="170" y="194" width="172" height="12" rx="6" fill="url(#scanLine)"/>
  <rect x="170" y="244" width="172" height="12" rx="6" fill="url(#scanLine)"/>
  <rect x="170" y="294" width="172" height="12" rx="6" fill="url(#scanLine)"/>

  <!-- Sentinel "eye" dot at the top of the shield -->
  <circle cx="256" cy="140" r="18" fill="#22d3ee"/>
  <circle cx="256" cy="140" r="7" fill="#0f172a"/>
</svg>
